name: Pixeldrain Keep-Alive

on:
  schedule:
    # Runs every 5 days to reset the 60-day timer
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Refresh Pixeldrain Links
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Extract the ID (part after /l/)
            ID=$(echo "$line" | sed 's/.*\/l\///' | tr -d '[:space:]')
            if [ -z "$ID" ]; then continue; fi
            echo "Refreshing folder: $ID"
            # Access the info API which updates 'last_viewed'
            curl -s "https://pixeldrain.com/api/fileset/$ID" > /dev/null
          done < links.txt
