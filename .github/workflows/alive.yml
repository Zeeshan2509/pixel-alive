name: Pixeldrain Album Keep-Alive

on:
  schedule:
    # Runs at 00:00 every 5th day of the month
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  refresh-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh Albums and Ping Files
        run: |
          # Check if links.txt exists
          if [ ! -f links.txt ]; then
            echo "❌ links.txt not found!"
            exit 1
          fi

          # Read links.txt line by line
          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            
            # Extract Album ID from the link
            ALBUM_ID=$(echo "$line" | sed 's|.*/l/||' | tr -d '[:space:]')
            
            # Fetch Album Metadata from Pixeldrain API
            RESPONSE=$(curl -s "https://pixeldrain.com/api/list/$ALBUM_ID")
            
            # Get the Album Title
            ALBUM_NAME=$(echo "$RESPONSE" | jq -r '.title')
            
            if [ "$ALBUM_NAME" == "null" ] || [ -z "$ALBUM_NAME" ]; then
              echo "⚠️  Could not find Album with ID: $ALBUM_ID"
              continue
            fi

            echo "📂 Processing Album: $ALBUM_NAME"

            # Get list of File IDs and Names separated by a pipe (|)
            # Example: id1|E01 Winter is Coming.mkv
            FILES=$(echo "$RESPONSE" | jq -r '.files[] | "\(.id)|\(.name)"')

            while f_line= read -r f_data; do
              # Split the ID and Name
              FID=$(echo "$f_data" | cut -d'|' -f1)
              FULL_NAME=$(echo "$f_data" | cut -d'|' -f2)
              
              # Remove the .mkv extension for the log
              CLEAN_NAME=$(echo "$FULL_NAME" | sed 's/\.mkv$//')
              
              echo "  ⚡ Pinging: $CLEAN_NAME"
              
              # Access first 1KB to reset Pixeldrain's 60-day timer
              curl -s -L --range 0-1024 "https://pixeldrain.com/api/file/$FID" -o /dev/null
              
            done <<< "$FILES"
            
            echo "✅ $ALBUM_NAME refreshed successfully."
            echo "------------------------------------------"
          done < links.txt
